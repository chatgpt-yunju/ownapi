<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云聚账号登录</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif;
      background: #f0efe9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fdfbf7;
      border-radius: 4px;
      box-shadow: 0 2px 16px rgba(44,44,44,0.10), 0 0 0 1px rgba(44,44,44,0.06);
      width: 100%;
      max-width: 380px;
      padding: 40px 36px 36px;
    }
    .logo-area {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 14px;
      background: #8a3324;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-icon svg {
      width: 26px;
      height: 26px;
      fill: #fdfbf7;
    }
    h1 {
      font-size: 20px;
      color: #2c2c2c;
      font-weight: 600;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .app-info {
      font-size: 13px;
      color: #7a7065;
      margin-bottom: 28px;
      text-align: center;
      line-height: 1.6;
    }
    .app-name {
      color: #8a3324;
      font-weight: 500;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 22px;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: #e6e5e3;
    }
    .divider-text {
      font-size: 12px;
      color: #aaa8a2;
      white-space: nowrap;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #5a5550;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d8d6d0;
      border-radius: 3px;
      font-size: 14px;
      font-family: inherit;
      background: #fdfbf7;
      color: #2c2c2c;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #8a3324;
      background: #fff;
    }
    .captcha-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .captcha-group input {
      flex: 1;
    }
    #captcha-img {
      cursor: pointer;
      border: 1px solid #d8d6d0;
      border-radius: 3px;
      height: 40px;
      flex-shrink: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
    }
    #captcha-img:hover {
      border-color: #8a3324;
    }
    #captcha-img svg {
      display: block;
      height: 40px;
      width: auto;
    }
    .btn {
      width: 100%;
      padding: 11px;
      background: #8a3324;
      color: #fdfbf7;
      border: none;
      border-radius: 3px;
      font-size: 15px;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: background 0.2s, opacity 0.2s;
      margin-top: 4px;
    }
    .btn:hover:not(:disabled) {
      background: #6e281c;
    }
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .or-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0;
    }
    .or-divider-line {
      flex: 1;
      height: 1px;
      background: #e6e5e3;
    }
    .or-text {
      font-size: 12px;
      color: #aaa8a2;
    }
    .qq-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 10px;
      background: #fdfbf7;
      border: 1px solid #d8d6d0;
      border-radius: 3px;
      font-size: 14px;
      font-family: inherit;
      color: #2c2c2c;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .qq-btn:hover {
      background: #f0efe9;
      border-color: #aaa8a2;
    }
    .qq-btn img {
      width: 20px;
      height: 20px;
    }
    .error {
      background: #fdf0ee;
      color: #8a3324;
      padding: 10px 14px;
      border-radius: 3px;
      margin-bottom: 16px;
      font-size: 13px;
      border-left: 3px solid #8a3324;
    }
    .tips {
      margin-top: 20px;
      font-size: 12px;
      color: #aaa8a2;
      text-align: center;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-area">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 1C8.676 1 6 3.676 6 7v1H4v14h16V8h-2V7c0-3.324-2.676-6-6-6zm0 2c2.276 0 4 1.724 4 4v1H8V7c0-2.276 1.724-4 4-4zm0 9a2 2 0 1 1 0 4 2 2 0 0 1 0-4z"/>
        </svg>
      </div>
      <h1>云聚账号</h1>
    </div>

    <div class="app-info">
      <span class="app-name" id="app-name">加载中…</span> 请求访问您的账号
    </div>

    <div id="error" class="error" style="display:none;"></div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">账号密码登录</span>
      <div class="divider-line"></div>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
      </div>
      <div class="form-group">
        <label>验证码</label>
        <div class="captcha-group">
          <input type="text" id="captcha" name="captcha" required maxlength="6" placeholder="请输入验证码">
          <div id="captcha-img" title="点击刷新"></div>
        </div>
      </div>
      <button type="submit" class="btn" id="submit-btn">登录并授权</button>
    </form>

    <div id="qq-section" style="display:none;">
      <div class="or-divider">
        <div class="or-divider-line"></div>
        <span class="or-text">其他方式</span>
        <div class="or-divider-line"></div>
      </div>
      <a id="qq-login-btn" href="#" class="qq-btn">
        <img src="https://qzonestyle.gtimg.cn/qzone/vas/opensns/res/img/Connect_logo_3.png" alt="QQ">
        QQ 登录
      </a>
    </div>

    <p class="tips">登录即表示您同意授权该应用访问您的云聚账号基本信息</p>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const appId = urlParams.get('app_id');
    const redirectUri = urlParams.get('redirect_uri');
    const state = urlParams.get('state') || '';

    let captchaToken = '';

    // 检测是否从QQ登录回调带回了token
    const returnToken = urlParams.get('token');
    if (returnToken) {
      autoAuthorizeWithToken(returnToken);
    }

    async function autoAuthorizeWithToken(token) {
      showError('QQ 登录成功，正在授权…');
      document.getElementById('error').style.background = '#f0f8f0';
      document.getElementById('error').style.color = '#5d7052';
      document.getElementById('error').style.borderLeftColor = '#5d7052';
      try {
        const res = await fetch('/api/sso/token-authorize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, app_id: appId, redirect_uri: redirectUri, state })
        });
        const data = await res.json();
        if (!res.ok) { showError(data.message || 'QQ授权失败'); return; }
        window.location.href = data.redirect_url;
      } catch {
        showError('网络错误，请稍后重试');
      }
    }

    async function init() {
      if (!appId || !redirectUri) {
        showError('缺少必要参数');
        return;
      }
      try {
        const response = await fetch(`/api/sso/authorize?app_id=${encodeURIComponent(appId)}&redirect_uri=${encodeURIComponent(redirectUri)}&state=${encodeURIComponent(state)}`);
        const data = await response.json();
        if (!response.ok) { showError(data.message || '应用验证失败'); return; }
        document.getElementById('app-name').textContent = data.app_name;
        loadCaptcha();
        // 显示QQ登录按钮
        const qqSection = document.getElementById('qq-section');
        const qqBtn = document.getElementById('qq-login-btn');
        const currentUrl = window.location.href.split('?')[0] + window.location.search;
        qqBtn.href = `/api/auth/qq?return_url=${encodeURIComponent(currentUrl)}`;
        // 检查QQ是否启用（通过公开配置接口）
        try {
          const cfgRes = await fetch('/api/settings/public');
          const cfg = await cfgRes.json();
          if (cfg.qq_login_enabled === 'true') {
            qqSection.style.display = 'block';
          }
        } catch {}
      } catch {
        showError('网络错误，请稍后重试');
      }
    }

    async function loadCaptcha() {
      try {
        const response = await fetch('/api/captcha');
        const data = await response.json();
        captchaToken = data.token;
        document.getElementById('captcha-img').innerHTML = data.svg;
        document.getElementById('captcha').value = '';
      } catch (err) {
        console.error('加载验证码失败:', err);
      }
    }

    document.getElementById('captcha-img').addEventListener('click', loadCaptcha);

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const captcha = document.getElementById('captcha').value;
      const submitBtn = document.getElementById('submit-btn');
      submitBtn.disabled = true;
      submitBtn.textContent = '登录中…';
      hideError();
      try {
        const response = await fetch('/api/sso/authorize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            app_id: appId,
            redirect_uri: redirectUri,
            state: state,
            username,
            password,
            captcha_token: captchaToken,
            captcha_text: captcha
          })
        });
        const data = await response.json();
        if (!response.ok) {
          showError(data.message || '登录失败');
          loadCaptcha();
          submitBtn.disabled = false;
          submitBtn.textContent = '登录并授权';
          return;
        }
        window.location.href = data.redirect_url;
      } catch {
        showError('网络错误，请稍后重试');
        loadCaptcha();
        submitBtn.disabled = false;
        submitBtn.textContent = '登录并授权';
      }
    });

    function showError(msg) {
      const el = document.getElementById('error');
      el.textContent = msg;
      el.style.display = 'block';
    }
    function hideError() {
      document.getElementById('error').style.display = 'none';
    }

    if (!returnToken) init();
  </script>
</body>
</html>
