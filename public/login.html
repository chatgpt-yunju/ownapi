<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>邮箱登录 - 云聚API 控制台</title>
  <link rel="stylesheet" href="/css/style.css?v=20260413">
  <script src="/js/theme.js?v=20260413"></script>
  <style>
    body { min-height: 100vh; display: grid; place-items: center; position: relative; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(108, 92, 231, 0.12), rgba(108, 92, 231, 0) 30%),
        radial-gradient(circle at 80% 18%, rgba(0, 206, 201, 0.12), rgba(0, 206, 201, 0) 28%);
      pointer-events: none;
    }
    .login-wrap { width: 100%; max-width: 980px; padding: 24px; position: relative; display:grid; grid-template-columns:minmax(0, 0.95fr) minmax(320px, 0.7fr); gap:20px; align-items:center; }
    .login-side {
      padding: 28px;
      border-radius: 24px;
      background: var(--gradient-panel);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
    }
    .login-side::before {
      content: '';
      position: absolute;
      inset: auto -18% -24% auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(162, 155, 254, 0.2), rgba(162, 155, 254, 0));
      pointer-events: none;
    }
    .login-side h1 { font-family: var(--font-display); font-size: 2.25rem; line-height: 1.06; margin-bottom: 0.9rem; max-width: 520px; }
    .login-side p { color: var(--text-secondary); font-size: 0.96rem; line-height: 1.8; max-width: 560px; }
    .login-proof { display:flex; gap:0.9rem; flex-wrap:wrap; margin-top:1rem; color:var(--text-muted); font-size:0.8rem; }
    .login-proof span { display:inline-flex; align-items:center; gap:0.42rem; }
    .login-proof span::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--accent-light); box-shadow:0 0 10px var(--accent-glow); }
    .login-points { display:grid; gap:0.8rem; margin-top:1.2rem; }
    .login-point {
      display:flex;
      gap:0.75rem;
      align-items:flex-start;
      padding:0.9rem 1rem;
      border-radius:16px;
      background:var(--surface-soft);
      border:1px solid var(--border-color);
    }
    .login-point strong { display:block; margin-bottom:0.2rem; font-size:0.92rem; }
    .login-point p { margin:0; font-size:0.82rem; line-height:1.65; }
    .login-point-icon {
      width:34px;
      height:34px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:var(--surface-accent);
      color:var(--accent-light);
      flex-shrink:0;
      font-size:0.92rem;
    }
    .login-links { display:flex; gap:0.8rem; flex-wrap:wrap; margin-top:1.2rem; }
    .login-card { background: var(--gradient-panel); border: 1px solid var(--border-color); border-radius: 24px; padding: 28px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
    .login-card::before {
      content: '';
      position: absolute;
      inset: -30% auto auto 58%;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108, 92, 231, 0.18), rgba(108, 92, 231, 0));
      pointer-events: none;
    }
    .login-title { margin-bottom: 12px; font-size: 1.55rem; color: var(--text-primary); font-family: var(--font-display); letter-spacing: 0.04em; }
    .muted { color: var(--text-muted); font-size: 0.85rem; }
    .login-eyebrow { display: inline-flex; align-items: center; gap: 0.55rem; padding: 0.45rem 0.8rem; margin-bottom: 1rem; border-radius: 999px; border: 1px solid var(--border-color); background: var(--surface-soft); color: var(--accent-light); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .login-eyebrow::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-light)); box-shadow: 0 0 12px var(--accent-glow); }
    .captcha-row { display: flex; gap: 8px; align-items: center; }
    .captcha-box { min-width: 108px; width: 108px; height: 44px; border: 1px solid var(--border-color); border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--bg-secondary); overflow: hidden; flex-shrink: 0; }
    .captcha-box img,
    .captcha-box svg { display: block; width: 108px; height: 44px; }
    .hidden { display: none !important; }
    .err { margin: 12px 0 0; color: var(--danger); font-size: 0.85rem; min-height: 1.2em; }
    .ok { color: var(--success); }
    .footer-links { margin-top: 16px; font-size: 0.82rem; display: flex; justify-content: space-between; }
    .divider { display: flex; align-items: center; gap: 8px; margin: 16px 0 12px; color: var(--text-muted); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
    .btn-qq { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border: 1px solid var(--border-color); border-radius: 999px; background: var(--surface-soft); color: var(--text-primary); cursor: pointer; font-size: 0.9rem; transition: background 0.15s, transform 0.15s, border-color 0.15s; }
    .btn-qq:hover { background: var(--surface-accent); border-color: var(--accent-light); transform: translateY(-1px); }
    .btn-qq svg { flex-shrink: 0; }
    @media (max-width: 640px) {
      .login-wrap { padding: 16px; grid-template-columns:1fr; }
      .login-side { padding: 22px 18px; border-radius: 20px; }
      .login-side h1 { font-size: 1.72rem; }
      .login-card { padding: 22px 18px; border-radius: 20px; }
      .captcha-row { flex-wrap: wrap; }
      .captcha-box { width: 100%; }
      .captcha-box img,
      .captcha-box svg { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-side">
      <h1>邮箱验证码登录</h1>
    </div>
    <div class="login-card">
      <div class="login-eyebrow">安全验证</div>
      <div class="login-title">邮箱验证码登录</div>
      <div class="muted" id="step-tip">请输入已绑定邮箱，发送验证码后即可登录</div>

      <div id="email-login-panel">
        <div class="form-group">
          <label>邮箱</label>
          <input class="oc-input" id="email-login-email" type="email" placeholder="请输入已绑定邮箱">
        </div>
        <div class="form-group">
          <label>邮箱验证码</label>
          <div class="captcha-row">
            <input class="oc-input" id="email-login-code" maxlength="6" placeholder="请输入 6 位验证码">
            <button class="btn-outline btn-sm" onclick="sendEmailLoginCode()">发送验证码</button>
          </div>
        </div>
        <button class="btn-accent" style="width:100%;" onclick="submitEmailLogin()">验证并登录</button>
        <div class="divider">或</div>
        <button class="btn-qq hidden" id="qq-login-section" onclick="startQQLogin()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#12B7F5"><path d="M12.003 2c-2.265 0-6.29 1.364-6.29 7.325v1.195S3.55 14.96 3.55 17.474c0 .665.297 1.373.743 1.093.386-.24 1.984-3.116 1.984-3.116s-.043 2.809 1.065 3.554c1.109.745 4.19 1.867 4.19 1.867s-1.337.95-1.418 1.488c-.08.537.3.566.802.566h2.168c.502 0 .882-.029.801-.566-.08-.537-1.418-1.488-1.418-1.488s3.081-1.122 4.19-1.867c1.108-.745 1.065-3.554 1.065-3.554s1.598 2.876 1.984 3.116c.446.28.743-.428.743-1.093 0-2.514-2.163-6.954-2.163-6.954V9.325C18.293 3.364 14.268 2 12.003 2z"/></svg>
          QQ 授权登录
        </button>
      </div>

      <div id="step-bind-email" class="hidden">
        <div class="form-group">
          <label>绑定邮箱</label>
          <input class="oc-input" id="bind-email" placeholder="请输入绑定邮箱地址">
        </div>
        <div class="form-group">
          <label>邮箱验证码</label>
          <div class="captcha-row">
            <input class="oc-input" id="bind-email-code" maxlength="6" placeholder="请输入 6 位验证码">
            <button class="btn-outline btn-sm" onclick="sendBindCode()">发送验证码</button>
          </div>
        </div>
        <button class="btn-accent" style="width:100%;" onclick="submitBindEmail()">绑定邮箱并继续</button>
        <button class="btn-outline" style="width:100%;margin-top:8px;" onclick="backToLogin()">返回登录页</button>
      </div>

      <div class="err" id="msg"></div>
      <div class="footer-links">
        <a href="/">返回首页</a>
        <a href="/register.html?return_url=%2Fconsole.html">创建新账号</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get('return_url') || '/console.html';
    let tempToken = sessionStorage.getItem('qq_bind_temp_token') || '';

    function clearQQBindState() {
      sessionStorage.removeItem('qq_bind_temp_token');
      sessionStorage.removeItem('qq_bind_pending');
      tempToken = '';
    }

    // 处理 QQ OAuth 回调：URL 带 token 参数则直接保存跳转
    (function handleQQCallback() {
      const urlToken = params.get('token');
      const urlError = params.get('error');
      if (urlToken) {
        clearQQBindState();
        localStorage.setItem('token', urlToken);
        localStorage.setItem('openclaw_token', urlToken);
        window.location.href = returnUrl;
        return;
      }
      const step = params.get('step');
      const bindToken = params.get('temp_token');
      if (step === 'bind_email' && bindToken) {
        tempToken = bindToken;
        sessionStorage.setItem('qq_bind_temp_token', bindToken);
        sessionStorage.setItem('qq_bind_pending', '1');
        window.history.replaceState({}, '', `${window.location.pathname}?return_url=${encodeURIComponent(returnUrl)}`);
        goStep('step-bind-email');
        setMsg('QQ 账号未绑定邮箱，请先绑定邮箱后继续', true);
        return;
      }
      if (urlError) {
        const msg = params.get('msg') || 'QQ登录失败，请重试';
        document.addEventListener('DOMContentLoaded', () => setMsg(decodeURIComponent(msg)));
      }
    })();

    function getApiCandidates() {
      const protocol = window.location.protocol;
      const host = window.location.hostname;
      const origin = window.location.origin;
      const candidates = [
        origin,
        'https://api.yunjunet.cn'
      ];
      return Array.from(new Set(candidates));
    }

    async function apiFetch(path, options = {}) {
      const candidates = getApiCandidates();
      let lastError = null;

      for (let i = 0; i < candidates.length; i++) {
        const base = candidates[i];
        try {
          const url = base + path;
          const res = await fetch(url, options);
          if (res.status !== 404 || i === candidates.length - 1) {
            return res;
          }
          lastError = new Error(`HTTP ${res.status} @ ${url}`);
        } catch (e) {
          lastError = e;
          if (i === candidates.length - 1) throw e;
        }
      }

      throw lastError || new Error('request failed');
    }

    function setMsg(text, ok = false) {
      const el = document.getElementById('msg');
      el.textContent = text || '';
      el.className = 'err' + (ok ? ' ok' : '');
    }

    function goStep(step) {
      document.getElementById('email-login-panel').classList.add('hidden');
      document.getElementById('step-bind-email').classList.add('hidden');
      document.getElementById(step).classList.remove('hidden');
      const tip = document.getElementById('step-tip');
      if (step === 'email-login-panel') tip.textContent = '请输入已绑定邮箱，发送验证码后即可登录';
      if (step === 'step-bind-email') tip.textContent = 'QQ 账号未绑定邮箱，请先绑定后继续登录';
    }

    function saveTokenAndJump(token) {
      clearQQBindState();
      localStorage.setItem('token', token);
      localStorage.setItem('openclaw_token', token);
      window.location.href = returnUrl;
    }

    async function sendEmailLoginCode() {
      const email = document.getElementById('email-login-email').value.trim();
      if (!email) return setMsg('请先输入邮箱');
      setMsg('');
      try {
        const res = await apiFetch('/api/auth/email-login/send-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '发送失败');
        setMsg(`验证码已发送至 ${data.masked_email || email}`, true);
      } catch (e) {
        setMsg(e.message || '发送失败');
      }
    }

    async function submitEmailLogin() {
      const email = document.getElementById('email-login-email').value.trim();
      const code = document.getElementById('email-login-code').value.trim();
      if (!email || !code) return setMsg('请完整填写邮箱和验证码');
      setMsg('');
      try {
        const res = await apiFetch('/api/auth/email-login/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, email_code: code })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '登录失败');
        saveTokenAndJump(data.token);
      } catch (e) {
        setMsg(e.message || '登录失败');
      }
    }

    async function sendBindCode() {
      const email = document.getElementById('bind-email').value.trim();
      if (!email) return setMsg('请先输入邮箱');
      setMsg('');
      try {
        const res = await apiFetch('/api/email-code/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, purpose: 'bind' })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '发送失败');
        setMsg('验证码已发送', true);
      } catch (e) {
        setMsg(e.message || '发送失败');
      }
    }

    async function submitBindEmail() {
      const email = document.getElementById('bind-email').value.trim();
      const code = document.getElementById('bind-email-code').value.trim();
      if (!tempToken || !email || !code) return setMsg('请完整填写邮箱和验证码');
      setMsg('');
      try {
        const res = await apiFetch('/api/auth/bind-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ temp_token: tempToken, email, email_code: code })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '绑定失败');
        saveTokenAndJump(data.token);
      } catch (e) {
        setMsg(e.message || '绑定失败');
      }
    }

    function backToLogin() {
      clearQQBindState();
      goStep('email-login-panel');
      setMsg('');
    }

    function startQQLogin() {
      const base = window.location.origin;
      const callbackReturn = window.location.origin + '/login.html?return_url=' + encodeURIComponent(returnUrl);
      window.location.href = base + '/api/auth/qq?return_url=' + encodeURIComponent(callbackReturn);
    }

    async function initQQLogin() {
      try {
        const res = await apiFetch('/api/settings/public', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();
        if (data.qq_login_enabled === 'true') {
          document.getElementById('qq-login-section').classList.remove('hidden');
        }
      } catch (e) { /* 静默失败 */ }
    }

    if (sessionStorage.getItem('qq_bind_pending') === '1' && tempToken) {
      goStep('step-bind-email');
      if (!document.getElementById('msg').textContent) {
        setMsg('QQ 账号未绑定邮箱，请先绑定邮箱后继续', true);
      }
    } else {
      goStep('email-login-panel');
    }
    initQQLogin();
  </script>
</body>
</html>
