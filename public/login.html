<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - OpenClaw API</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; position: relative; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(0, 199, 255, 0.12), rgba(0, 199, 255, 0) 30%),
        radial-gradient(circle at 80% 18%, rgba(255, 95, 207, 0.12), rgba(255, 95, 207, 0) 28%);
      pointer-events: none;
    }
    .login-wrap { width: 100%; max-width: 460px; padding: 24px; position: relative; }
    .login-card { background: linear-gradient(180deg, rgba(9, 24, 42, 0.82), rgba(5, 15, 28, 0.88)); border: 1px solid rgba(130, 205, 255, 0.22); border-radius: 24px; padding: 28px; box-shadow: 0 24px 60px rgba(2, 12, 24, 0.46); position: relative; overflow: hidden; }
    .login-card::before {
      content: '';
      position: absolute;
      inset: -30% auto auto 58%;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 199, 255, 0.18), rgba(0, 199, 255, 0));
      pointer-events: none;
    }
    .login-title { margin-bottom: 12px; font-size: 1.55rem; color: var(--text-primary); font-family: var(--font-display); letter-spacing: 0.04em; }
    .muted { color: var(--text-muted); font-size: 0.85rem; }
    .login-eyebrow { display: inline-flex; align-items: center; gap: 0.55rem; padding: 0.45rem 0.8rem; margin-bottom: 1rem; border-radius: 999px; border: 1px solid rgba(116, 245, 255, 0.18); background: rgba(9, 29, 48, 0.56); color: #dffaff; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .login-eyebrow::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, #29d6b0, #74f5ff); box-shadow: 0 0 12px rgba(116, 245, 255, 0.65); }
    .captcha-row { display: flex; gap: 8px; align-items: center; }
    .captcha-box { min-width: 108px; width: 108px; height: 44px; border: 1px solid rgba(130, 205, 255, 0.22); border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.94); overflow: hidden; flex-shrink: 0; }
    .captcha-box img,
    .captcha-box svg { display: block; width: 108px; height: 44px; }
    .hidden { display: none !important; }
    .err { margin: 12px 0 0; color: var(--danger); font-size: 0.85rem; min-height: 1.2em; }
    .ok { color: var(--success); }
    .footer-links { margin-top: 16px; font-size: 0.82rem; display: flex; justify-content: space-between; }
    .divider { display: flex; align-items: center; gap: 8px; margin: 16px 0 12px; color: var(--text-muted); font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
    .btn-qq { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border: 1px solid rgba(130, 205, 255, 0.22); border-radius: 999px; background: rgba(7, 20, 35, 0.84); color: var(--text-primary); cursor: pointer; font-size: 0.9rem; transition: background 0.15s, transform 0.15s, border-color 0.15s; }
    .btn-qq:hover { background: rgba(9, 28, 48, 0.9); border-color: var(--accent-light); transform: translateY(-1px); }
    .btn-qq svg { flex-shrink: 0; }
    @media (max-width: 640px) {
      .login-wrap { padding: 16px; }
      .login-card { padding: 22px 18px; border-radius: 20px; }
      .captcha-row { flex-wrap: wrap; }
      .captcha-box { width: 100%; }
      .captcha-box img,
      .captcha-box svg { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-eyebrow">Secure Access</div>
      <div class="login-title">账号登录</div>
      <div class="muted" id="step-tip">请输入账号密码</div>

      <div id="step-login">
        <div class="form-group">
          <label>用户名</label>
          <input class="oc-input" id="username" autocomplete="username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label>密码</label>
          <input class="oc-input" id="password" type="password" autocomplete="current-password" placeholder="请输入密码">
        </div>
        <div class="form-group">
          <label>图形验证码</label>
          <div class="captcha-row">
            <input class="oc-input" id="captcha-text" maxlength="6" placeholder="验证码">
            <div class="captcha-box" id="captcha-box" title="点击刷新"></div>
          </div>
        </div>
        <button class="btn-accent" style="width:100%;" onclick="submitLogin()">登录</button>
        <div id="qq-login-section" class="hidden">
          <div class="divider">或</div>
          <button class="btn-qq" onclick="startQQLogin()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="#12B7F5"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.236 2.636 7.855 6.356 9.312-.084-.793-.16-2.01.033-2.874.175-.786 1.17-4.975 1.17-4.975s-.299-.597-.299-1.48c0-1.386.806-2.422 1.808-2.422.853 0 1.267.64 1.267 1.408 0 .858-.547 2.144-.83 3.338-.236.997.499 1.808 1.479 1.808 1.775 0 3.142-1.87 3.142-4.57 0-2.387-1.717-4.056-4.166-4.056-2.837 0-4.502 2.128-4.502 4.328 0 .857.33 1.776.741 2.278a.3.3 0 0 1 .069.285c-.075.313-.243 1.001-.276 1.141-.044.184-.147.223-.339.134-1.249-.582-2.03-2.407-2.03-3.874 0-3.154 2.292-6.052 6.608-6.052 3.469 0 6.165 2.473 6.165 5.776 0 3.447-2.173 6.22-5.19 6.22-1.013 0-1.966-.527-2.292-1.148l-.623 2.326c-.226.869-.835 1.958-1.244 2.621.937.29 1.931.446 2.962.446 5.523 0 10-4.477 10-10S17.523 2 12 2z"/></svg>
            QQ 登录
          </button>
        </div>
      </div>

      <div id="step-email-verify" class="hidden">
        <div class="form-group">
          <label>邮箱验证码</label>
          <input class="oc-input" id="email-code-login" maxlength="6" placeholder="请输入6位验证码">
        </div>
        <div class="muted" id="masked-email-tip"></div>
        <button class="btn-accent" style="width:100%;margin-top:8px;" onclick="submitEmailVerify()">验证并登录</button>
        <button class="btn-outline" style="width:100%;margin-top:8px;" onclick="backToLogin()">返回重试</button>
      </div>

      <div id="step-bind-email" class="hidden">
        <div class="form-group">
          <label>绑定邮箱</label>
          <input class="oc-input" id="bind-email" placeholder="请输入邮箱地址">
        </div>
        <div class="form-group">
          <label>邮箱验证码</label>
          <div class="captcha-row">
            <input class="oc-input" id="bind-email-code" maxlength="6" placeholder="请输入6位验证码">
            <button class="btn-outline btn-sm" onclick="sendBindCode()">发送验证码</button>
          </div>
        </div>
        <button class="btn-accent" style="width:100%;" onclick="submitBindEmail()">绑定并登录</button>
        <button class="btn-outline" style="width:100%;margin-top:8px;" onclick="backToLogin()">返回重试</button>
      </div>

      <div class="err" id="msg"></div>
      <div class="footer-links">
        <a href="/">返回首页</a>
        <a href="/register.html?return_url=%2Fconsole.html">注册账号</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get('return_url') || '/console.html';
    let captchaToken = '';
    let captchaAvailable = true;
    let tempToken = '';

    // 处理 QQ OAuth 回调：URL 带 token 参数则直接保存跳转
    (function handleQQCallback() {
      const urlToken = params.get('token');
      const urlError = params.get('error');
      if (urlToken) {
        localStorage.setItem('token', urlToken);
        localStorage.setItem('openclaw_token', urlToken);
        window.location.href = returnUrl;
        return;
      }
      if (urlError) {
        const msg = params.get('msg') || 'QQ登录失败，请重试';
        document.addEventListener('DOMContentLoaded', () => setMsg(decodeURIComponent(msg)));
      }
    })();

    function getApiCandidates() {
      const protocol = window.location.protocol;
      const host = window.location.hostname;
      const origin = window.location.origin;
      const candidates = [
        origin,
        'https://api.yunjunet.cn'
      ];
      return Array.from(new Set(candidates));
    }

    async function apiFetch(path, options = {}) {
      const candidates = getApiCandidates();
      let lastError = null;

      for (let i = 0; i < candidates.length; i++) {
        const base = candidates[i];
        try {
          const url = base + path;
          const res = await fetch(url, options);
          if (res.status !== 404 || i === candidates.length - 1) {
            return res;
          }
          lastError = new Error(`HTTP ${res.status} @ ${url}`);
        } catch (e) {
          lastError = e;
          if (i === candidates.length - 1) throw e;
        }
      }

      throw lastError || new Error('request failed');
    }

    function setMsg(text, ok = false) {
      const el = document.getElementById('msg');
      el.textContent = text || '';
      el.className = 'err' + (ok ? ' ok' : '');
    }

    function goStep(step) {
      document.getElementById('step-login').classList.add('hidden');
      document.getElementById('step-email-verify').classList.add('hidden');
      document.getElementById('step-bind-email').classList.add('hidden');
      document.getElementById(step).classList.remove('hidden');
      const tip = document.getElementById('step-tip');
      if (step === 'step-login') tip.textContent = '请输入账号密码';
      if (step === 'step-email-verify') tip.textContent = '请输入邮箱验证码';
      if (step === 'step-bind-email') tip.textContent = '该账号未绑定邮箱，请先绑定';
    }

    function saveTokenAndJump(token) {
      localStorage.setItem('token', token);
      localStorage.setItem('openclaw_token', token);
      window.location.href = returnUrl;
    }

    function renderCaptchaSvg(svgText) {
      const box = document.getElementById('captcha-box');
      if (!svgText) {
        box.textContent = '加载失败';
        return;
      }
      const encoded = window.btoa(unescape(encodeURIComponent(svgText)));
      box.innerHTML = `<img alt="图形验证码" src="data:image/svg+xml;base64,${encoded}">`;
    }

    async function loadCaptcha() {
      const box = document.getElementById('captcha-box');
      try {
        box.textContent = '加载中';
        const res = await apiFetch('/api/captcha', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.token || !data.svg) throw new Error('验证码数据不完整');
        captchaToken = data.token;
        captchaAvailable = true;
        renderCaptchaSvg(data.svg);
        // 只清除验证码不可用的提示，不清除登录错误消息
        if (document.getElementById('msg').textContent.includes('图形验证码暂时不可用')) setMsg('');
      } catch (e) {
        captchaToken = '';
        captchaAvailable = false;
        box.textContent = '点击重试';
        setMsg('图形验证码暂时不可用，当前将仅校验账号密码。可点击右侧重试加载。');
      }
    }

    async function submitLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const captchaText = document.getElementById('captcha-text').value.trim();
      if (!username || !password) return setMsg('请输入用户名和密码');
      if (captchaToken && !captchaText) return setMsg('请输入图形验证码');
      setMsg('');
      try {
        const payload = { username, password };
        if (captchaToken && captchaText) {
          payload.captcha_token = captchaToken;
          payload.captcha_text = captchaText;
        }
        const res = await apiFetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '登录失败');
        tempToken = data.temp_token || '';
        if (data.token) return saveTokenAndJump(data.token);
        if (data.step === 'email_verify') {
          document.getElementById('masked-email-tip').textContent = `验证码已发送至 ${data.masked_email || '您的邮箱'}`;
          goStep('step-email-verify');
          return setMsg('请查收邮箱验证码', true);
        }
        if (data.step === 'bind_email') {
          goStep('step-bind-email');
          return setMsg('请先绑定邮箱', true);
        }
        setMsg('登录流程返回异常');
      } catch (e) {
        setMsg(e.message || '登录失败');
      } finally {
        document.getElementById('captcha-text').value = '';
        if (captchaAvailable) loadCaptcha();
      }
    }

    async function submitEmailVerify() {
      const code = document.getElementById('email-code-login').value.trim();
      if (!tempToken || !code) return setMsg('缺少验证参数');
      setMsg('');
      try {
        const res = await apiFetch('/api/auth/login/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ temp_token: tempToken, email_code: code })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '验证码验证失败');
        saveTokenAndJump(data.token);
      } catch (e) {
        setMsg(e.message || '验证码验证失败');
      }
    }

    async function sendBindCode() {
      const email = document.getElementById('bind-email').value.trim();
      if (!email) return setMsg('请先输入邮箱');
      setMsg('');
      try {
        const res = await apiFetch('/api/email-code/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, purpose: 'bind' })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '发送失败');
        setMsg('验证码已发送', true);
      } catch (e) {
        setMsg(e.message || '发送失败');
      }
    }

    async function submitBindEmail() {
      const email = document.getElementById('bind-email').value.trim();
      const code = document.getElementById('bind-email-code').value.trim();
      if (!tempToken || !email || !code) return setMsg('请完整填写邮箱和验证码');
      setMsg('');
      try {
        const res = await apiFetch('/api/auth/bind-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ temp_token: tempToken, email, email_code: code })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '绑定失败');
        saveTokenAndJump(data.token);
      } catch (e) {
        setMsg(e.message || '绑定失败');
      }
    }

    function backToLogin() {
      goStep('step-login');
      setMsg('');
    }

    function startQQLogin() {
      const base = window.location.origin;
      const callbackReturn = window.location.origin + '/login.html?return_url=' + encodeURIComponent(returnUrl);
      window.location.href = base + '/api/auth/qq?return_url=' + encodeURIComponent(callbackReturn);
    }

    async function initQQLogin() {
      try {
        const res = await apiFetch('/api/settings/public', { cache: 'no-store' });
        if (!res.ok) return;
        const data = await res.json();
        if (data.qq_login_enabled === 'true') {
          document.getElementById('qq-login-section').classList.remove('hidden');
        }
      } catch (e) { /* 静默失败 */ }
    }

    document.getElementById('captcha-box').addEventListener('click', loadCaptcha);
    loadCaptcha();
    initQQLogin();
  </script>
</body>
</html>
