<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>账户注册 - OpenClaw API 控制台</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="/js/theme.js"></script>
  <style>
    body { min-height: 100vh; display: grid; place-items: center; position: relative; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(108, 92, 231, 0.12), rgba(108, 92, 231, 0) 30%),
        radial-gradient(circle at 82% 16%, rgba(0, 206, 201, 0.12), rgba(0, 206, 201, 0) 28%);
      pointer-events: none;
    }
    .register-wrap { width: 100%; max-width: 1020px; padding: 24px; position: relative; display:grid; grid-template-columns:minmax(0, 0.95fr) minmax(340px, 0.72fr); gap:20px; align-items:center; }
    .register-side {
      padding: 28px;
      border-radius: 24px;
      background: var(--gradient-panel);
      border: 1px solid var(--border-color);
      box-shadow: var(--shadow-soft);
      position: relative;
      overflow: hidden;
    }
    .register-side::before {
      content: '';
      position: absolute;
      inset: auto -18% -24% auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(162, 155, 254, 0.2), rgba(162, 155, 254, 0));
      pointer-events: none;
    }
    .register-side h1 { font-family: var(--font-display); font-size: 2.2rem; line-height: 1.06; margin-bottom: 0.9rem; max-width: 540px; }
    .register-side p { color: var(--text-secondary); font-size: 0.96rem; line-height: 1.8; max-width: 560px; }
    .register-proof { display:flex; gap:0.9rem; flex-wrap:wrap; margin-top:1rem; color:var(--text-muted); font-size:0.8rem; }
    .register-proof span { display:inline-flex; align-items:center; gap:0.42rem; }
    .register-proof span::before { content:''; width:6px; height:6px; border-radius:50%; background:var(--accent-light); box-shadow:0 0 10px var(--accent-glow); }
    .register-points { display:grid; gap:0.8rem; margin-top:1.2rem; }
    .register-point {
      display:flex;
      gap:0.75rem;
      align-items:flex-start;
      padding:0.9rem 1rem;
      border-radius:16px;
      background:var(--surface-soft);
      border:1px solid var(--border-color);
    }
    .register-point strong { display:block; margin-bottom:0.2rem; font-size:0.92rem; }
    .register-point p { margin:0; font-size:0.82rem; line-height:1.65; }
    .register-point-icon {
      width:34px;
      height:34px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:var(--surface-accent);
      color:var(--accent-light);
      flex-shrink:0;
      font-size:0.92rem;
    }
    .register-links { display:flex; gap:0.8rem; flex-wrap:wrap; margin-top:1.2rem; }
    .register-card { background: var(--gradient-panel); border: 1px solid var(--border-color); border-radius: 24px; padding: 28px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
    .register-card::before {
      content: '';
      position: absolute;
      inset: -32% auto auto 58%;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108, 92, 231, 0.16), rgba(108, 92, 231, 0));
      pointer-events: none;
    }
    .register-eyebrow { display: inline-flex; align-items: center; gap: 0.55rem; padding: 0.45rem 0.8rem; margin-bottom: 1rem; border-radius: 999px; border: 1px solid var(--border-color); background: var(--surface-soft); color: var(--accent-light); font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .register-eyebrow::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-light)); box-shadow: 0 0 12px var(--accent-glow); }
    .register-title { margin-bottom: 12px; font-size: 1.55rem; color: var(--text-primary); font-family: var(--font-display); letter-spacing: 0.04em; }
    .muted { color: var(--text-muted); font-size: 0.85rem; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .captcha-row { display: flex; gap: 8px; align-items: center; }
    .captcha-box { min-width: 108px; width: 108px; height: 44px; border: 1px solid var(--border-color); border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--bg-secondary); overflow: hidden; flex-shrink: 0; }
    .captcha-box img,
    .captcha-box svg { display: block; width: 108px; height: 44px; }
    .hidden { display: none !important; }
    .err { margin: 12px 0 0; color: var(--danger); font-size: 0.85rem; min-height: 1.2em; }
    .ok { color: var(--success); }
    .footer-links { margin-top: 16px; font-size: 0.82rem; display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .hint { margin-top: 0.35rem; color: var(--text-muted); font-size: 0.76rem; line-height: 1.55; }
    @media (max-width: 640px) {
      .register-wrap { padding: 16px; grid-template-columns:1fr; }
      .register-side { padding: 22px 18px; border-radius: 20px; }
      .register-side h1 { font-size: 1.72rem; }
      .register-card { padding: 22px 18px; border-radius: 20px; }
      .grid-2 { grid-template-columns: 1fr; gap: 0.75rem; }
      .captcha-row { flex-wrap: wrap; }
      .captcha-box { width: 100%; }
      .captcha-box img,
      .captcha-box svg { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="register-wrap">
    <div class="register-side">
    </div>
    <div class="register-card">
      <div class="register-eyebrow">账户开通</div>
      <div class="register-title">创建账号</div>
      <div class="muted">注册成功后自动登录并跳转至控制台，继续完成 API Key 创建、模型确认与环境配置</div>

      <div class="grid-2" style="margin-top:16px;">
        <div class="form-group">
          <label>用户名</label>
          <input class="oc-input" id="username" autocomplete="username" placeholder="请输入用户名（用于登录）">
        </div>
        <div class="form-group">
          <label>邀请码</label>
          <input class="oc-input" id="invite-code" placeholder="选填 · 按当前邀请规则结算">
        </div>
      </div>

      <div class="form-group">
        <label>邮箱</label>
        <input class="oc-input" id="email" type="email" autocomplete="email" placeholder="请输入接收验证码的邮箱">
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label>密码</label>
          <input class="oc-input" id="password" type="password" autocomplete="new-password" placeholder="至少 8 位，需包含字母和数字">
          <div class="hint">密码至少 8 位，且必须包含字母和数字。</div>
        </div>
        <div class="form-group">
          <label>确认密码</label>
          <input class="oc-input" id="password-confirm" type="password" autocomplete="new-password" placeholder="请再次输入密码">
        </div>
      </div>

      <div class="form-group">
        <label>邮箱验证码</label>
        <div class="captcha-row">
          <input class="oc-input" id="email-code" maxlength="6" placeholder="请输入 6 位邮箱验证码">
          <button class="btn-outline btn-sm" id="send-email-btn" onclick="sendRegisterCode()">发送验证码</button>
        </div>
      </div>

      <div class="form-group">
        <label>图形验证码</label>
        <div class="captcha-row">
          <input class="oc-input" id="captcha-text" maxlength="6" placeholder="请输入图形验证码">
          <div class="captcha-box" id="captcha-box" title="点击刷新"></div>
        </div>
      </div>

      <button class="btn-accent" style="width:100%;" onclick="submitRegister()">注册并进入控制台创建 API Key</button>
      <div class="err" id="msg"></div>

      <div class="footer-links">
        <a href="/">返回首页</a>
        <a href="/login.html?return_url=%2Fconsole.html">已有账号，前往登录</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get('return_url') || '/console.html';
    const inviteCodeFromQuery = params.get('invite_code') || '';
    if (inviteCodeFromQuery) {
      document.getElementById('invite-code').value = inviteCodeFromQuery.toUpperCase();
    }
    let captchaToken = '';
    let captchaAvailable = true;
    let sendCooldown = 0;
    let cooldownTimer = null;

    function getApiCandidates() {
      const origin = window.location.origin;
      return Array.from(new Set([origin, 'https://api.yunjunet.cn']));
    }

    async function apiFetch(path, options = {}) {
      const candidates = getApiCandidates();
      let lastError = null;
      for (let i = 0; i < candidates.length; i++) {
        const base = candidates[i];
        try {
          const res = await fetch(base + path, options);
          if (res.status !== 404 || i === candidates.length - 1) return res;
          lastError = new Error(`HTTP ${res.status}`);
        } catch (e) {
          lastError = e;
          if (i === candidates.length - 1) throw e;
        }
      }
      throw lastError || new Error('request failed');
    }

    function setMsg(text, ok = false) {
      const el = document.getElementById('msg');
      el.textContent = text || '';
      el.className = 'err' + (ok ? ' ok' : '');
    }

    function renderCaptchaSvg(svgText) {
      const box = document.getElementById('captcha-box');
      if (!svgText) {
        box.textContent = '加载失败';
        return;
      }
      const encoded = window.btoa(unescape(encodeURIComponent(svgText)));
      box.innerHTML = `<img alt="图形验证码" src="data:image/svg+xml;base64,${encoded}">`;
    }

    async function loadCaptcha() {
      const box = document.getElementById('captcha-box');
      try {
        box.textContent = '加载中';
        const res = await apiFetch('/api/captcha', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.token || !data.svg) throw new Error('验证码数据不完整');
        captchaToken = data.token;
        captchaAvailable = true;
        renderCaptchaSvg(data.svg);
        if (document.getElementById('msg').textContent.includes('图形验证码暂不可用')) setMsg('');
      } catch (e) {
        captchaToken = '';
        captchaAvailable = false;
        box.textContent = '点击重试';
        setMsg('图形验证码暂不可用，可点击验证码区域重试加载。');
      }
    }

    function startCooldown(seconds) {
      sendCooldown = seconds;
      const btn = document.getElementById('send-email-btn');
      btn.disabled = true;
      btn.textContent = `${sendCooldown}s 后重发`;
      clearInterval(cooldownTimer);
      cooldownTimer = setInterval(() => {
        sendCooldown -= 1;
        if (sendCooldown <= 0) {
          clearInterval(cooldownTimer);
          btn.disabled = false;
          btn.textContent = '发送验证码';
          return;
        }
        btn.textContent = `${sendCooldown}s 后重发`;
      }, 1000);
    }

    async function sendRegisterCode() {
      const email = document.getElementById('email').value.trim();
      if (!email) return setMsg('请先输入邮箱');
      setMsg('');
      try {
        const res = await apiFetch('/api/email-code/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, purpose: 'register' })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '发送失败');
        setMsg('邮箱验证码已发送', true);
        startCooldown(60);
      } catch (e) {
        setMsg(e.message || '发送失败');
      }
    }

    async function submitRegister() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('password-confirm').value;
      const emailCode = document.getElementById('email-code').value.trim();
      const inviteCode = document.getElementById('invite-code').value.trim();
      const captchaText = document.getElementById('captcha-text').value.trim();

      if (!username || !email || !password || !emailCode) return setMsg('请完整填写注册信息');
      if (password !== passwordConfirm) return setMsg('两次输入的密码不一致');
      if (!captchaToken || !captchaText) return setMsg('请输入图形验证码');

      setMsg('');
      try {
        const res = await apiFetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username,
            password,
            email,
            email_code: emailCode,
            invite_code: inviteCode,
            captcha_token: captchaToken,
            captcha_text: captchaText
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '注册失败');
        if (data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('openclaw_token', data.token);
          window.location.href = returnUrl;
          return;
        }
        setMsg('注册成功，请前往登录', true);
      } catch (e) {
        setMsg(e.message || '注册失败');
      } finally {
        document.getElementById('captcha-text').value = '';
        loadCaptcha();
      }
    }

    document.getElementById('captcha-box').addEventListener('click', loadCaptcha);
    loadCaptcha();
  </script>
</body>
</html>
