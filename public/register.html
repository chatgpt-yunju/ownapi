<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - OpenClaw API</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { min-height: 100vh; display: grid; place-items: center; position: relative; }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 18% 18%, rgba(0, 199, 255, 0.12), rgba(0, 199, 255, 0) 30%),
        radial-gradient(circle at 82% 16%, rgba(255, 95, 207, 0.12), rgba(255, 95, 207, 0) 28%);
      pointer-events: none;
    }
    .register-wrap { width: 100%; max-width: 520px; padding: 24px; position: relative; }
    .register-card { background: linear-gradient(180deg, rgba(9, 24, 42, 0.84), rgba(5, 15, 28, 0.9)); border: 1px solid rgba(130, 205, 255, 0.22); border-radius: 24px; padding: 28px; box-shadow: 0 24px 60px rgba(2, 12, 24, 0.46); position: relative; overflow: hidden; }
    .register-card::before {
      content: '';
      position: absolute;
      inset: -32% auto auto 58%;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 95, 207, 0.16), rgba(255, 95, 207, 0));
      pointer-events: none;
    }
    .register-eyebrow { display: inline-flex; align-items: center; gap: 0.55rem; padding: 0.45rem 0.8rem; margin-bottom: 1rem; border-radius: 999px; border: 1px solid rgba(116, 245, 255, 0.18); background: rgba(9, 29, 48, 0.56); color: #dffaff; font-size: 0.78rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }
    .register-eyebrow::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, #29d6b0, #74f5ff); box-shadow: 0 0 12px rgba(116, 245, 255, 0.65); }
    .register-title { margin-bottom: 12px; font-size: 1.55rem; color: var(--text-primary); font-family: var(--font-display); letter-spacing: 0.04em; }
    .muted { color: var(--text-muted); font-size: 0.85rem; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .captcha-row { display: flex; gap: 8px; align-items: center; }
    .captcha-box { min-width: 108px; width: 108px; height: 44px; border: 1px solid rgba(130, 205, 255, 0.22); border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.94); overflow: hidden; flex-shrink: 0; }
    .captcha-box img,
    .captcha-box svg { display: block; width: 108px; height: 44px; }
    .hidden { display: none !important; }
    .err { margin: 12px 0 0; color: var(--danger); font-size: 0.85rem; min-height: 1.2em; }
    .ok { color: var(--success); }
    .footer-links { margin-top: 16px; font-size: 0.82rem; display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
    .hint { margin-top: 0.35rem; color: var(--text-muted); font-size: 0.76rem; line-height: 1.55; }
    @media (max-width: 640px) {
      .register-wrap { padding: 16px; }
      .register-card { padding: 22px 18px; border-radius: 20px; }
      .grid-2 { grid-template-columns: 1fr; gap: 0; }
      .captcha-row { flex-wrap: wrap; }
      .captcha-box { width: 100%; }
      .captcha-box img,
      .captcha-box svg { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="register-wrap">
    <div class="register-card">
      <div class="register-eyebrow">Create Account</div>
      <div class="register-title">创建账号</div>
      <div class="muted">注册后自动登录并跳转到控制台</div>

      <div class="grid-2" style="margin-top:16px;">
        <div class="form-group">
          <label>用户名</label>
          <input class="oc-input" id="username" autocomplete="username" placeholder="请输入用户名">
        </div>
        <div class="form-group">
          <label>邀请码</label>
          <input class="oc-input" id="invite-code" placeholder="选填，可获得奖励">
        </div>
      </div>

      <div class="form-group">
        <label>邮箱</label>
        <input class="oc-input" id="email" type="email" autocomplete="email" placeholder="请输入邮箱地址">
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label>密码</label>
          <input class="oc-input" id="password" type="password" autocomplete="new-password" placeholder="至少8位，包含字母和数字">
          <div class="hint">密码至少 8 位，且必须包含字母和数字。</div>
        </div>
        <div class="form-group">
          <label>确认密码</label>
          <input class="oc-input" id="password-confirm" type="password" autocomplete="new-password" placeholder="再次输入密码">
        </div>
      </div>

      <div class="form-group">
        <label>邮箱验证码</label>
        <div class="captcha-row">
          <input class="oc-input" id="email-code" maxlength="6" placeholder="请输入6位验证码">
          <button class="btn-outline btn-sm" id="send-email-btn" onclick="sendRegisterCode()">发送验证码</button>
        </div>
      </div>

      <div class="form-group">
        <label>图形验证码</label>
        <div class="captcha-row">
          <input class="oc-input" id="captcha-text" maxlength="6" placeholder="验证码">
          <div class="captcha-box" id="captcha-box" title="点击刷新"></div>
        </div>
      </div>

      <button class="btn-accent" style="width:100%;" onclick="submitRegister()">注册并进入控制台</button>
      <div class="err" id="msg"></div>

      <div class="footer-links">
        <a href="/">返回首页</a>
        <a href="/login.html?return_url=%2Fconsole.html">已有账号，去登录</a>
      </div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const returnUrl = params.get('return_url') || '/console.html';
    let captchaToken = '';
    let captchaAvailable = true;
    let sendCooldown = 0;
    let cooldownTimer = null;

    function getApiCandidates() {
      const origin = window.location.origin;
      return Array.from(new Set([origin, 'https://api.yunjunet.cn']));
    }

    async function apiFetch(path, options = {}) {
      const candidates = getApiCandidates();
      let lastError = null;
      for (let i = 0; i < candidates.length; i++) {
        const base = candidates[i];
        try {
          const res = await fetch(base + path, options);
          if (res.status !== 404 || i === candidates.length - 1) return res;
          lastError = new Error(`HTTP ${res.status}`);
        } catch (e) {
          lastError = e;
          if (i === candidates.length - 1) throw e;
        }
      }
      throw lastError || new Error('request failed');
    }

    function setMsg(text, ok = false) {
      const el = document.getElementById('msg');
      el.textContent = text || '';
      el.className = 'err' + (ok ? ' ok' : '');
    }

    function renderCaptchaSvg(svgText) {
      const box = document.getElementById('captcha-box');
      if (!svgText) {
        box.textContent = '加载失败';
        return;
      }
      const encoded = window.btoa(unescape(encodeURIComponent(svgText)));
      box.innerHTML = `<img alt="图形验证码" src="data:image/svg+xml;base64,${encoded}">`;
    }

    async function loadCaptcha() {
      const box = document.getElementById('captcha-box');
      try {
        box.textContent = '加载中';
        const res = await apiFetch('/api/captcha', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (!data.token || !data.svg) throw new Error('验证码数据不完整');
        captchaToken = data.token;
        captchaAvailable = true;
        renderCaptchaSvg(data.svg);
        if (document.getElementById('msg').textContent.includes('图形验证码暂时不可用')) setMsg('');
      } catch (e) {
        captchaToken = '';
        captchaAvailable = false;
        box.textContent = '点击重试';
        setMsg('图形验证码暂时不可用，请点击右侧重试后再注册。');
      }
    }

    function startCooldown(seconds) {
      sendCooldown = seconds;
      const btn = document.getElementById('send-email-btn');
      btn.disabled = true;
      btn.textContent = `${sendCooldown}s 后重发`;
      clearInterval(cooldownTimer);
      cooldownTimer = setInterval(() => {
        sendCooldown -= 1;
        if (sendCooldown <= 0) {
          clearInterval(cooldownTimer);
          btn.disabled = false;
          btn.textContent = '发送验证码';
          return;
        }
        btn.textContent = `${sendCooldown}s 后重发`;
      }, 1000);
    }

    async function sendRegisterCode() {
      const email = document.getElementById('email').value.trim();
      if (!email) return setMsg('请先输入邮箱');
      setMsg('');
      try {
        const res = await apiFetch('/api/email-code/send', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, purpose: 'register' })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '发送失败');
        setMsg('邮箱验证码已发送', true);
        startCooldown(60);
      } catch (e) {
        setMsg(e.message || '发送失败');
      }
    }

    async function submitRegister() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const passwordConfirm = document.getElementById('password-confirm').value;
      const emailCode = document.getElementById('email-code').value.trim();
      const inviteCode = document.getElementById('invite-code').value.trim();
      const captchaText = document.getElementById('captcha-text').value.trim();

      if (!username || !email || !password || !emailCode) return setMsg('请完整填写注册信息');
      if (password !== passwordConfirm) return setMsg('两次输入的密码不一致');
      if (!captchaToken || !captchaText) return setMsg('请输入图形验证码');

      setMsg('');
      try {
        const res = await apiFetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username,
            password,
            email,
            email_code: emailCode,
            invite_code: inviteCode,
            captcha_token: captchaToken,
            captcha_text: captchaText
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || '注册失败');
        if (data.token) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('openclaw_token', data.token);
          window.location.href = returnUrl;
          return;
        }
        setMsg('注册成功，请前往登录', true);
      } catch (e) {
        setMsg(e.message || '注册失败');
      } finally {
        document.getElementById('captcha-text').value = '';
        loadCaptcha();
      }
    }

    document.getElementById('captcha-box').addEventListener('click', loadCaptcha);
    loadCaptcha();
  </script>
</body>
</html>
